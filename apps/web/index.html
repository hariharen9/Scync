<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Scync — Zero-Knowledge Secrets Manager for Developers</title>
    <meta name="title" content="Scync — Zero-Knowledge Secrets Manager for Developers" />
    <meta name="description" content="The open-source, zero-knowledge secrets manager built for developers. Store API keys, recovery codes, and environment variables securely with client-side encryption." />
    <meta name="keywords" content="secrets manager, api keys, environment variables, zero knowledge, encryption, developer tools, open source, vault, credentials" />
    <meta name="author" content="Scync Team" />
    <meta name="theme-color" content="#060606" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://scync.app/" />
    <meta property="og:title" content="Scync — Your Secrets. Synced. Encrypted. Everywhere." />
    <meta property="og:description" content="The zero-knowledge secrets manager built for developers who are tired of pasting API keys into Notion. Architecturally impossible for the server to see your data." />
    <meta property="og:image" content="/og-2.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://scync.app/" />
    <meta property="twitter:title" content="Scync — Your Secrets. Synced. Encrypted." />
    <meta property="twitter:description" content="Zero-knowledge secrets manager for developers. Client-side encryption with Web Crypto API." />
    <meta property="twitter:image" content="/og-2.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://scync.app/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  </head>
  <body style="background-color: #060606; color: white; margin: 0; font-family: sans-serif; overflow: hidden;">
    <div id="root">
      <div id="loading-state" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 1rem;">
        <p style="font-size: 1.2rem; font-weight: 500;">Initializing Scync...</p>
        <div id="error-display" style="color: #ef4444; max-width: 80%; text-align: center; font-family: monospace; font-size: 0.9rem; white-space: pre-wrap;"></div>
      </div>
    </div>
    
    <script>
      // Global error handler to help debug production issues
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        const display = document.getElementById('error-display');
        if (display) {
          display.innerText = 'Error: ' + msg + '\nAt: ' + url + ':' + lineNo + ':' + columnNo + (error ? '\nStack: ' + error.stack : '');
        }
        return false;
      };
      
      window.addEventListener('unhandledrejection', function(event) {
        const display = document.getElementById('error-display');
        if (display) {
          display.innerText = 'Promise Rejection: ' + event.reason + (event.reason && event.reason.stack ? '\nStack: ' + event.reason.stack : '');
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
